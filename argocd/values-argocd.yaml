# Helm values for the ArgoCD install.
# Stripped to the minimum needed for the GitOps demo — dex (SSO),
# notifications, and applicationset controller are all disabled to reduce
# image pulls and memory footprint on the 4-core Codespace.

global:
  logging:
    level: info

server:
  extraArgs:
    - --insecure   # TLS handled by Istio/ingress in this PoC
  service:
    type: ClusterIP

# Disable components not needed for the demo
dex:
  enabled: false   # SSO — not used

notifications:
  enabled: false   # notification controller — not used

applicationSet:
  enabled: false   # ApplicationSet controller — not used

configs:
  params:
    server.insecure: true
  rbac:
    policy.default: role:readonly
    policy.csv: |
      p, role:admin, applications, *, */*, allow
      p, role:admin, clusters,     get, *, allow
      p, role:admin, repositories, *, *, allow
      g, argocd-admins, role:admin
