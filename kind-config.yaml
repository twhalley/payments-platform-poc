kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: payments-poc
nodes:
  - role: control-plane
    # expose 80/443 on the host now so ingress works later without recreating the cluster
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  - role: worker
