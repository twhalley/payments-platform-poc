apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: payments-dev
namePrefix: dev-
resources:
  - ../../base
patches:
  # dev: start with 3 replicas instead of 2
  - target:
      kind: Deployment
      name: nginx-app
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  # dev: lower HPA max to avoid saturating local kind cluster
  - target:
      kind: HorizontalPodAutoscaler
      name: nginx-app
    patch: |-
      - op: replace
        path: /spec/maxReplicas
        value: 6
labels:
  - includeSelectors: false
    pairs:
      environment: dev

images:
  - name: nginxinc/nginx-unprivileged
    newName: ghcr.io/twhalley/payments-platform-poc/nginx-app
    newTag: b6e85e31a33987611acc1aba987d6d039efaef4a
