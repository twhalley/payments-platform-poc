# Simulates a settlement service consuming payment events from RabbitMQ.
# Runs as a long-lived Deployment — shows the consumer staying up, ACKing messages,
# and leaving a dead-letter queue entry if processing fails.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-consumer
  namespace: payments-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: payment-consumer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment-consumer
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: consumer
          image: python:3.12.9-alpine3.21
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install pika --quiet
              python3 - <<'PYEOF'
              import pika, json, os, time

              url = os.environ["RABBITMQ_URL"]
              conn = pika.BlockingConnection(pika.URLParameters(url))
              ch = conn.channel()

              ch.queue_declare(queue="payment.authorised", durable=True)
              ch.queue_declare(queue="payment.authorised.dlq", durable=True)
              ch.basic_qos(prefetch_count=1)   # one message at a time — fair dispatch

              def callback(ch, method, properties, body):
                  event = json.loads(body)
                  print(f"[consumer] Processing {event['transaction_id']} £{event['amount_pence']/100:.2f}")
                  time.sleep(0.5)   # simulate settlement processing
                  ch.basic_ack(delivery_tag=method.delivery_tag)
                  print(f"[consumer] ACKed {event['transaction_id']}")

              ch.basic_consume(queue="payment.authorised", on_message_callback=callback)
              print("[consumer] Waiting for messages...")
              ch.start_consuming()
              PYEOF
          env:
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-url
                  key: url
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 100m, memory: 128Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
