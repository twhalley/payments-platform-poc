# Helm values for Bitnami RabbitMQ chart.
# Install:
#   helm repo add bitnami https://charts.bitnami.com/bitnami
#   helm upgrade --install rabbitmq bitnami/rabbitmq \
#     -n payments-dev -f k8s/rabbitmq/values-rabbitmq.yaml --wait
#
# RabbitMQ is a StatefulSet — each pod gets a stable hostname (rabbitmq-0, rabbitmq-1)
# and its own PVC. This matters because RabbitMQ nodes identify each other by hostname
# in their cluster formation protocol; restarting a pod must retain its name and data.

# Bitnami removed versioned tags from docker.io/bitnami/* (Aug 2025 migration to
# "Bitnami Secure Images"); the chart's default image now 404s. Pull the archived
# image from docker.io/bitnamilegacy/* instead. allowInsecureImages lets the chart
# accept the non-bitnami registry override.
global:
  security:
    allowInsecureImages: true
image:
  registry: docker.io
  repository: bitnamilegacy/rabbitmq
  tag: 4.1.3-debian-12-r1

replicaCount: 3    # quorum for HA — losing 1 node still has a majority

auth:
  username: payments
  # In production: use External Secrets Operator or KMS-backed Secret.
  # For PoC: set via --set auth.password=... and do NOT commit the real value.
  password: "poc-change-me"
  erlangCookie: "poc-erlang-cookie"   # shared across nodes; must match

persistence:
  enabled: true
  size: 1Gi

# The chart auto-creates its own PDB (maxUnavailable: 1) which collides with the
# standalone minAvailable: 2 PDB in k8s/rabbitmq/pdb.yaml (same name → kubectl
# apply merges both fields → "minAvailable and maxUnavailable cannot be both set").
# Disable the chart's PDB; pdb.yaml is the authoritative one.
pdb:
  create: false

resources:
  requests: { cpu: 100m, memory: 256Mi }
  limits:   { cpu: 500m, memory: 512Mi }

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: monitoring

# Queues relevant to the payment flow
extraConfiguration: |
  default_vhost = payments
  default_permissions.configure = .*
  default_permissions.read = .*
  default_permissions.write = .*
