# Default-deny all ingress/egress, then allow only what's needed.
# Maps to PCI-DSS Requirement 1: install and maintain network security controls.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
spec:
  podSelector: {}       # applies to every pod in the namespace
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nginx-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nginx-app
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nginx-egress-dns
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nginx-app
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
