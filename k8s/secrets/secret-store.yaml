# ESO ClusterSecretStore — points to OpenBao running in the cluster.
# ClusterSecretStore is cluster-scoped so any namespace can reference it.
#
# Auth: token auth using the dev root token stored in a K8s Secret.
# The token secret is created by `make secrets` — never committed to git.
#
# Production equivalent: replace this file with gcp-secret-store.yaml.
# All ExternalSecret manifests remain IDENTICAL — only the store changes.
#
# ESO provider docs: https://external-secrets.io/latest/provider/vault/
# (OpenBao is API-compatible with Vault — same ESO provider works for both)
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: openbao
spec:
  provider:
    vault:
      server: "http://openbao.openbao.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: openbao-token        # created by `make secrets` — not committed
          namespace: external-secrets
          key: token
