# Production ClusterSecretStore for GCP Secret Manager + Workload Identity.
#
# HOW TO USE:
#   1. Deploy to GKE (not kind — requires Workload Identity metadata server)
#   2. kubectl apply -f k8s/secrets/gcp-secret-store.yaml
#      (replaces secret-store.yaml — all ExternalSecret manifests stay identical)
#   3. GCP resources provisioned by terraform/secrets.tf
#
# WHY GCP Secret Manager in production:
#   - Secrets are encrypted at rest with Cloud KMS CMEK (our KMS key from terraform/)
#   - IAM-controlled access: no token file to rotate, no static credential in-cluster
#   - Workload Identity: ESO's K8s ServiceAccount is bound to a GCP ServiceAccount
#     that has secretmanager.secretAccessor on exactly these secrets (least-privilege)
#   - Secret versions + audit log in Cloud Audit Logs satisfy PCI-DSS Req 10 (log access)
#   - Automatic rotation: secret versions increment; refreshInterval keeps pods current
#   - No Vault to operate: GCP manages HA, backup, and regional replication
#
# HOW IT DIFFERS FROM openbao (secret-store.yaml):
#   - provider: gcpsm  instead of  provider: vault
#   - auth uses workloadIdentity (GKE IRSA-equivalent) instead of tokenSecretRef
#   - ExternalSecret.remoteRef.key = GCP secret resource name (e.g. "payment-gateway-key")
#     (OpenBao uses KV paths like "payments/gateway")
#   - No cluster-local service to install — GCP SM is a managed API
#
# The rest of the pipeline (ExternalSecret → K8s Secret → pod envFrom) is identical.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
  annotations:
    # Not applied in kind/Codespaces — GKE + Workload Identity required.
    environment: "production-gke-only"
spec:
  provider:
    gcpsm:
      projectID: "your-gcp-project-id"          # set by terraform output
      auth:
        workloadIdentity:
          # GKE Workload Identity binds this K8s SA → GCP SA (see terraform/secrets.tf)
          clusterLocation: "europe-west2"
          clusterName: "payments-cluster"
          clusterProjectID: "your-gcp-project-id"
          serviceAccountRef:
            name: external-secrets-sa             # provisioned by terraform/secrets.tf
            namespace: external-secrets
