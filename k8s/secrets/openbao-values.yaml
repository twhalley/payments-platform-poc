# OpenBao Helm values — dev mode for local/Codespaces demo.
# OpenBao is the open-source community fork of HashiCorp Vault (post-BSL relicense).
# The API is identical to Vault — ESO's vault provider works with OpenBao unchanged.
#
# Dev mode: single-node, in-memory storage, auto-unsealed, root token = "root".
# NOT for production — production uses HA + GCS backend (or use GCP Secret Manager directly).
#
# Production equivalent: swap this ClusterSecretStore for gcp-secret-store.yaml.
# The ExternalSecret manifests and all pod specs remain identical.
server:
  dev:
    enabled: true
    devRootToken: "root"
  logLevel: "warn"
  resources:
    requests: { cpu: 50m,  memory: 64Mi }
    limits:   { cpu: 200m, memory: 256Mi }
  readinessProbe:
    enabled: true
    path: /v1/sys/health?standbyok=true
  livenessProbe:
    enabled: true
    path: /v1/sys/health?standbyok=true
    initialDelaySeconds: 60

# No UI — saves resources in demo
ui:
  enabled: false

# No sidecar injector — we use ESO (push model), not sidecar (pull model)
injector:
  enabled: false
