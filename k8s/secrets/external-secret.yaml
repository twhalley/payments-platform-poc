# ExternalSecrets — ESO pulls values from OpenBao and creates K8s Secrets.
# The pod specs reference these K8s Secrets by name — they never change
# regardless of whether the backing store is OpenBao or GCP Secret Manager.
#
# refreshInterval: ESO re-reads from the store every minute and updates the K8s Secret.
# If a secret is rotated in OpenBao/GCP SM, the K8s Secret is updated without redeployment.
#
# The demo shows: secret lives in OpenBao → ESO creates K8s Secret → pod reads it.
# In production:  secret lives in GCP SM  → ESO creates K8s Secret → pod reads it.
# The pod manifest is IDENTICAL in both cases.
---
# Payment gateway API key — used by the secure_payment.py demo
# (replaces the hardcoded PAYMENT_GATEWAY_KEY in vulnerable_payment.py)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: payment-gateway-key
  namespace: payments-dev
  annotations:
    # Maps to PCI-DSS Req 3.5: protect all keys used to secure payment data
    pci-dss.req: "3.5"
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: payment-gateway-key       # K8s Secret name the pod will reference
    creationPolicy: Owner           # ESO owns the Secret — deletes it when ExternalSecret is deleted
    template:
      type: Opaque
      metadata:
        labels:
          managed-by: external-secrets
  data:
    - secretKey: api_key
      remoteRef:
        key: payments/gateway       # OpenBao path
        property: api_key
---
# Database credentials — used by the secure_payment.py demo
# (replaces the hardcoded DATABASE_PASSWORD in vulnerable_payment.py)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: payments-dev
  annotations:
    pci-dss.req: "8.3"             # PCI-DSS Req 8.3: secure all individual credentials
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: db-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          managed-by: external-secrets
  data:
    - secretKey: password
      remoteRef:
        key: payments/database
        property: password
    - secretKey: host
      remoteRef:
        key: payments/database
        property: host
