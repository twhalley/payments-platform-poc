# OpenSSF Scorecard — supply chain security health check.
#
# Scorecard evaluates 18 automated checks across the repo:
#   Branch protection, Code review, CI tests, Fuzzing, License,
#   Maintained, Pinned dependencies, SAST, Security policy, Signed releases,
#   Token permissions, Vulnerabilities, Dangerous workflow patterns, and more.
#
# Results:
#   - Published to https://scorecard.dev/viewer/?uri=github.com/twhalley/payments-platform-poc
#   - Uploaded as SARIF → GitHub Security tab (same tab as CodeQL + Trivy)
#   - Badge in README reflects the live score
#
# Scorecard docs: https://github.com/ossf/scorecard-action
# CIS control: supply chain risk management
# ISO 27001:   A.5.23 ICT supply chain security
# NIST CSF:    ID.SC — supply chain risk management
name: OpenSSF Scorecard

on:
  # Run on every push to master so the badge stays current
  push:
    branches: [master]
  # Weekly Monday 01:30 UTC — catches dependency drift even without code changes
  schedule:
    - cron: '30 1 * * 1'
  # Re-evaluate whenever branch protection rules change (a Scorecard-specific trigger)
  branch_protection_rule:

# Scorecard requires read-all at the top level; individual jobs scope down further
# NOTE: no global env: block allowed — scorecard-action workflow restrictions forbid it.
permissions: read-all

jobs:
  scorecard:
    name: OpenSSF Scorecard analysis
    runs-on: ubuntu-latest

    permissions:
      # Upload SARIF results to GitHub Security tab
      security-events: write
      # Required for keyless signing of Scorecard attestation (OIDC)
      id-token: write
      # Read repo contents and Actions metadata
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # Scorecard needs the full history to evaluate branch protection and commit signing
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          # Publish results publicly at scorecard.dev — enables the badge
          # Set to false if the repo is private
          publish_results: true

      - name: Upload Scorecard results as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: scorecard-sarif
          path: scorecard-results.sarif
          retention-days: 30

      - name: Upload Scorecard SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: scorecard-results.sarif
          # Shown as "tool" label in the Security tab
          category: openssf-scorecard
