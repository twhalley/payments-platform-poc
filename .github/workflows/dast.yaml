name: DAST — OWASP ZAP

# Runs on every push to master and weekly.
# Starts nginx in a Docker container, runs ZAP baseline scan against it,
# and uploads an HTML report as a CI artifact.
#
# This covers the DAST layer (dynamic testing of a running app) that SAST
# (CodeQL/Snyk) and SCA (Trivy) cannot — open redirects, missing security
# headers, injection vectors visible only at the HTTP layer.
on:
  push:
    branches: [master]
  schedule:
    - cron: "0 2 * * 1"   # weekly Monday 2am — catch newly disclosed web vulns

permissions:
  contents: read
  security-events: write   # upload SARIF to GitHub Security tab
  issues: write            # ZAP action can open issues for findings

jobs:
  zap-baseline:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start nginx (scan target)
        run: |
          docker run -d \
            --name nginx-target \
            -p 8080:8080 \
            nginxinc/nginx-unprivileged:1.27-alpine
          # Wait until nginx is ready
          for i in $(seq 1 15); do
            curl -sf http://localhost:8080 > /dev/null && echo "nginx ready" && break
            echo "Waiting... ($i)"
            sleep 2
          done

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8080"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a -j"    # -a: include ajax spider, -j: add active rules
          fail_action: false      # report findings; don't fail the build in PoC
                                  # set to true in production to gate on findings

      - name: Upload ZAP HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html
          retention-days: 30

      - name: Upload ZAP SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: report_sarif.sarif
