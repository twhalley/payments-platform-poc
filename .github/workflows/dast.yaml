name: DAST — OWASP ZAP

# Runs on every push to master and weekly.
# Starts nginx in a Docker container, runs ZAP baseline scan against it.
# Findings are uploaded to the GitHub Security tab (SARIF) AND as a CI artifact.
#
# fail_action: false — findings are reported as warnings, not build failures.
# In a production pipeline set to true to gate on findings.
#
# DAST covers what SAST/SCA cannot: runtime HTTP behaviour — missing security
# headers, open redirects, injection vectors visible only at the HTTP layer.
on:
  push:
    branches: [master]
  schedule:
    - cron: "0 2 * * 1"   # weekly Monday 2am — catch newly disclosed web vulns
  workflow_dispatch:        # allow manual trigger for testing / re-runs

permissions:
  contents: read
  security-events: write   # upload ZAP SARIF to GitHub Security tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  zap-baseline:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Start nginx (scan target)
        run: |
          docker run -d \
            --name nginx-target \
            -p 8080:8080 \
            nginxinc/nginx-unprivileged:1.27-alpine
          for i in $(seq 1 15); do
            curl -sf http://localhost:8080 > /dev/null && echo "nginx ready" && break
            echo "Waiting... ($i)" && sleep 2
          done

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@6c5a007541891231cd9e0ddec25d4f25c59c9874  # v0.15.0
        with:
          target: "http://localhost:8080"
          rules_file_name: ".zap/rules.tsv"
          fail_action: false          # report findings; don't fail the build in PoC
          allow_issue_writing: false  # findings go to Security tab + artifact, not GitHub issues
          # Generates report_html.html, report_json.json, report_xml.xml in workspace

      - name: Convert ZAP JSON report to SARIF
        if: always()
        run: |
          python3 - <<'EOF'
          import json, sys, os

          def risk_to_level(risk):
              # ZAP risk codes: 0=Info, 1=Low, 2=Medium, 3=High
              return {0: "note", 1: "note", 2: "warning", 3: "error"}.get(int(risk), "warning")

          report_path = "report_json.json"
          if not os.path.exists(report_path):
              print("::warning::ZAP JSON report not found — skipping SARIF conversion")
              with open("zap.sarif", "w") as f:
                  json.dump({"version": "2.1.0", "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json", "runs": []}, f)
              sys.exit(0)

          with open(report_path) as f:
              zap = json.load(f)

          rules, results, seen = [], [], set()
          for site in zap.get("site", []):
              for alert in site.get("alerts", []):
                  rid = alert["pluginid"]
                  if rid not in seen:
                      seen.add(rid)
                      rules.append({
                          "id": rid,
                          "name": alert["name"],
                          "shortDescription": {"text": alert["alert"]},
                          "helpUri": f"https://www.zaproxy.org/docs/alerts/{rid}/",
                          "properties": {"security-severity": str(round(int(alert["riskcode"]) * 10 / 3, 1))}
                      })
                  for i, inst in enumerate(alert.get("instances", [])):
                      uri = inst.get("uri", site.get("@name", ""))
                      # GitHub Code Scanning requires physicalLocation in every result.
                      # DAST findings reference HTTP endpoints, not source files, so we
                      # anchor each finding to dast/scan-target.txt (a real repo file)
                      # and carry the actual URL in the message + logicalLocations.
                      results.append({
                          "ruleId": rid,
                          "level": risk_to_level(alert["riskcode"]),
                          "message": {"text": f"URL: {uri}\nMethod: {inst.get('method','')}\nEvidence: {inst.get('evidence','')}\n\n{alert['desc'].strip()}\n\nSolution: {alert.get('solution','').strip()}"},
                          "locations": [{
                              "physicalLocation": {
                                  "artifactLocation": {"uri": "dast/scan-target.txt", "uriBaseId": "%SRCROOT%"},
                                  "region": {"startLine": i + 1}
                              },
                              "logicalLocations": [{"name": uri, "kind": "url"}]
                          }]
                      })

          sarif = {
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
              "version": "2.1.0",
              "runs": [{"tool": {"driver": {"name": "OWASP ZAP", "informationUri": "https://www.zaproxy.org/", "rules": rules}}, "results": results}]
          }
          with open("zap.sarif", "w") as f:
              json.dump(sarif, f, indent=2)
          print(f"Converted {len(results)} ZAP finding instances ({len(rules)} unique rules) to SARIF")
          EOF

      - name: Upload ZAP SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        if: always()
        with:
          sarif_file: zap.sarif
          category: zap-baseline
