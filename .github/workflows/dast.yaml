name: DAST — OWASP ZAP

# Runs on every push to master and weekly.
# Starts nginx in a Docker container, runs ZAP baseline scan against it.
# ZAP uploads the HTML + JSON reports as a CI artifact automatically.
#
# fail_action: false — findings are reported as warnings, not build failures.
# In a production pipeline set to true to gate on findings.
#
# DAST covers what SAST/SCA cannot: runtime HTTP behaviour — missing security
# headers, open redirects, injection vectors visible only at the HTTP layer.
on:
  push:
    branches: [master]
  schedule:
    - cron: "0 2 * * 1"   # weekly Monday 2am — catch newly disclosed web vulns

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  zap-baseline:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Start nginx (scan target)
        run: |
          docker run -d \
            --name nginx-target \
            -p 8080:8080 \
            nginxinc/nginx-unprivileged:1.27-alpine
          for i in $(seq 1 15); do
            curl -sf http://localhost:8080 > /dev/null && echo "nginx ready" && break
            echo "Waiting... ($i)" && sleep 2
          done

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@6c5a007541891231cd9e0ddec25d4f25c59c9874  # v0.15.0
        with:
          target: "http://localhost:8080"
          rules_file_name: ".zap/rules.tsv"
          fail_action: false          # report findings; don't fail the build in PoC
          allow_issue_writing: false  # findings go to the Actions artifact, not GitHub issues
          # ZAP uploads HTML + JSON reports as a 'zap_scan' artifact automatically.
          # View results: Actions tab → this run → Artifacts → zap_scan
