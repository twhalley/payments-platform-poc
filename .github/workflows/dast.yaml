name: DAST — OWASP ZAP

# Runs on every push to master and weekly.
# Starts nginx in a Docker container, runs ZAP baseline scan against it,
# and uploads results to the GitHub Security tab as SARIF.
#
# This covers the DAST layer (dynamic testing of a running app) that SAST
# (CodeQL/Snyk) and SCA (Trivy) cannot — open redirects, missing security
# headers, injection vectors visible only at the HTTP layer.
#
# fail_action: false — findings are reported, not build-blocking.
# In a production pipeline set to true to gate on HIGH/CRITICAL findings.
on:
  push:
    branches: [master]
  schedule:
    - cron: "0 2 * * 1"   # weekly Monday 2am — catch newly disclosed web vulns

permissions:
  contents: read
  security-events: write   # upload SARIF to GitHub Security tab

jobs:
  zap-baseline:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Start nginx (scan target)
        run: |
          docker run -d \
            --name nginx-target \
            -p 8080:8080 \
            nginxinc/nginx-unprivileged:1.27-alpine
          for i in $(seq 1 15); do
            curl -sf http://localhost:8080 > /dev/null && echo "nginx ready" && break
            echo "Waiting... ($i)" && sleep 2
          done

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@6c5a007541891231cd9e0ddec25d4f25c59c9874  # v0.15.0
        with:
          target: "http://localhost:8080"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"
          fail_action: false          # report findings; don't fail the build in PoC
          allow_issue_writing: false  # don't open GitHub issues — findings go to Security tab

      - name: Upload ZAP SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3.36.2
        if: always()
        with:
          sarif_file: zap-results.sarif
          category: owasp-zap-dast
