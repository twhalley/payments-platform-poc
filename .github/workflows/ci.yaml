name: CI — Build, Scan, Sign, Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  packages: write          # push image to GHCR
  security-events: write   # upload SARIF to GitHub Security
  id-token: write          # cosign keyless signing via OIDC

# Opt into Node.js 24 runtime ahead of the June 16 2026 forced migration.
# actions/checkout v4 still declares node20 in action.yml but is compatible.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Lint manifests ────────────────────────────────────────────────────────
  lint:
    name: Lint Kustomize + Helm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Kustomize build (dry-run)
        run: |
          kubectl kustomize k8s/overlays/dev > /dev/null
          kubectl kustomize k8s/overlays/prod > /dev/null

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
      - name: Helm lint
        run: helm lint charts/nginx-app

  # ── 2. Snyk — AI-powered vulnerability + IaC scanning ───────────────────────
  snyk:
    name: Snyk IaC Scan
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Snyk CLI
        run: |
          curl -fsSL https://static.snyk.io/cli/stable/snyk-linux -o /tmp/snyk
          sudo install -m 0755 /tmp/snyk /usr/local/bin/snyk

      - name: Snyk IaC scan (Terraform + K8s manifests)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "${SNYK_TOKEN}" ]; then
            echo "::notice::SNYK_TOKEN not set — add it in Settings → Secrets → Actions to enable Snyk IaC scanning."
            exit 0
          fi
          snyk iac test \
            --severity-threshold=high \
            --sarif-file-output=snyk.sarif \
            . 2>&1 || true

      - name: Upload Snyk results to GitHub Security
        if: hashFiles('snyk.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: snyk.sarif
          category: snyk-iac

  # ── 3. CodeQL — GitHub AI static analysis (Python) ───────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          languages: python   # CodeQL doesn't support PHP natively; PHP scanned by semgrep
      - uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          category: "/language:python"

  # ── 3b. Semgrep — SAST for PHP (and Python cross-check) ──────────────────────
  # Semgrep supports PHP natively, making it the right tool to surface findings
  # from demo/insecure-code/vulnerable_payment.php in the GitHub Security tab.
  # Uses the free OSS ruleset (no token required).
  semgrep:
    name: Semgrep SAST (PHP + Python)
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run Semgrep
        run: |
          pip install semgrep --quiet
          semgrep scan \
            --config "p/php" \
            --config "p/python" \
            --sarif \
            --output semgrep.sarif \
            --error \
            . 2>&1 || true   # findings don't fail the build — uploaded to Security tab

      - name: Upload Semgrep SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ── 4. Build + Trivy image scan ───────────────────────────────────────────────
  build-scan:
    name: Build Image + Trivy Scan
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          # load keeps the image in the local Docker daemon for Trivy on PRs
          # (push and load are mutually exclusive when both true — safe here as push=false on PRs)
          load: ${{ github.event_name == 'pull_request' }}
          tags: ghcr.io/${{ github.repository }}/nginx-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy — image scan (CVE + secrets + misconfigs)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/nginx-app:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"          # fail the build on CRITICAL/HIGH CVEs
          ignore-unfixed: true    # only fail on CVEs that have a fix available

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── 5. cosign keyless sign + SBOM ─────────────────────────────────────────────
  sign:
    name: Sign Image + Attach SBOM
    runs-on: ubuntu-latest
    needs: [snyk, build-scan]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Install syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ghcr.io/${{ github.repository }}/nginx-app:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Keyless sign image (Sigstore OIDC — no long-lived keys)
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/nginx-app@${{ needs.build-scan.outputs.image-digest }}

      - name: Attach SBOM as image attestation
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            ghcr.io/${{ github.repository }}/nginx-app@${{ needs.build-scan.outputs.image-digest }}

  # ── 6. Bump image tag in Kustomize overlay → opens a PR for ArgoCD gitops ─────
  # Branch protection prevents github-actions[bot] from pushing directly to master.
  # Correct GitOps pattern: CI opens a PR with the image bump; human (or auto-merge
  # policy) merges it; ArgoCD detects the change in master and syncs the cluster.
  deploy:
    name: Update Manifest (GitOps bump)
    runs-on: ubuntu-latest
    needs: sign
    if: github.event_name != 'pull_request'
    permissions:
      contents: write       # push the gitops bump branch
      pull-requests: write  # open the PR against master
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Open GitOps bump PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUMP_BRANCH="gitops/bump-${{ github.sha }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BUMP_BRANCH"

          # Idempotent: replace existing newTag line or append the images block
          if grep -q "newTag:" k8s/overlays/dev/kustomization.yaml; then
            sed -i "s|newTag:.*|newTag: ${{ github.sha }}|" k8s/overlays/dev/kustomization.yaml
          else
            printf '\nimages:\n  - name: nginxinc/nginx-unprivileged\n    newName: ghcr.io/${{ github.repository }}/nginx-app\n    newTag: ${{ github.sha }}\n' \
              >> k8s/overlays/dev/kustomization.yaml
          fi

          git add k8s/overlays/dev/kustomization.yaml
          if git diff --staged --quiet; then
            echo "No changes — image tag already up to date."
            exit 0
          fi

          git commit -m "chore: bump nginx-app to ${{ github.sha }}"
          # Force-push: bump branches are CI-managed and ephemeral; safe to overwrite on rerun
          git push --force origin "$BUMP_BRANCH"

          # Open PR; idempotent — succeed if already open for this branch
          SHORT="${{ github.sha }}"
          SHORT="${SHORT:0:7}"
          EXISTING=$(gh pr list --head "$BUMP_BRANCH" --state open --json url --jq '.[0].url' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "PR already open: $EXISTING"
          else
            gh pr create \
              --title "GitOps: bump nginx-app to ${SHORT}" \
              --body "Automated image-tag bump triggered by [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})." \
              --head "$BUMP_BRANCH" \
              --base master \
              --label "gitops"
            echo "PR created."
          fi
