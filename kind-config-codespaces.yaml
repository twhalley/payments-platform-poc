# kind cluster config for GitHub Codespaces (Docker — no Podman, no hostPort 80/443).
# Ports 80/443 are omitted: Codespaces uses kubectl port-forward for all access,
# so ingress host-port bindings are unnecessary and can conflict with the host.
# Auto-selected by scripts/cluster-setup.sh when CODESPACES=true.
#
# Node image pinned to v1.32.3: kind's default (v1.36.x) is too new for the
# docker-outside-of-docker runtime in Codespaces — the API server doesn't respond
# fast enough during CNI installation, causing a "connection refused on 6443" failure.
# v1.32.3 is an LTS-aligned release, well-tested across all common environments.
#
# Explicit subnets prevent conflicts with the Codespaces VM Docker bridge
# (typically 172.18.0.0/16); 10.244/16 and 10.96/12 are kind's own defaults
# but declaring them explicitly makes the intent clear.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: payments-poc
networking:
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
  # Disable the built-in CNI: kind installs it by running kubectl *inside* the
  # kind container, which fails with "connection refused on 6443" because the
  # DinD Docker daemon's bridge doesn't support hairpin NAT (a container can't
  # reach its own external bridge IP). The cluster-setup.sh script installs
  # Flannel *from outside* the kind containers instead, using the API server's
  # external port mapping — a path that works fine.
  disableDefaultCNI: true
nodes:
  - role: control-plane
    image: kindest/node:v1.36.1
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
  - role: worker
    image: kindest/node:v1.36.1
